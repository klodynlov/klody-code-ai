<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualiseur d'arbres équilibrés — Klody</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #1a2a6c);
            color: white;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        .controls {
            background: rgba(0,0,0,0.3);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
        }
        input, button, select {
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
        }
        input {
            width: 100px;
            text-align: center;
        }
        button {
            background: #4CAF50;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }
        button:hover {
            background: #45a049;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .trees-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
        }
        .tree {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 20px;
            min-width: 300px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
        }
        .tree h2 {
            text-align: center;
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 24px;
        }
        .tree-canvas {
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            width: 100%;
            height: 400px;
            display: block;
            margin: 0 auto;
        }
        .legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 3px;
        }
        .avl-color { background: #FF6B6B; }
        .rb-color { background: #4ECDC4; }
        .b-color { background: #FFE66D; }
        .status {
            text-align: center;
            margin-top: 20px;
            font-size: 18px;
            min-height: 25px;
        }
        .highlight {
            animation: highlight 0.5s ease;
        }
        @keyframes highlight {
            0% { background: rgba(255,255,255,0.3); }
            100% { background: transparent; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Visualiseur d'Arbres Équilibrés</h1>
        
        <div class="controls">
            <input type="number" id="valueInput" placeholder="Valeur" min="1" max="999">
            <button onclick="insertValue()">Insérer</button>
            <button onclick="clearAll()">Effacer</button>
            <select id="treeSelect">
                <option value="avl">AVL</option>
                <option value="rb">Rouge-Noir</option>
                <option value="b">B-Arbre</option>
            </select>
            <button onclick="insertRandom()">Aléatoire</button>
        </div>
        
        <div class="status" id="status">Prêt à insérer des valeurs</div>
        
        <div class="trees-container">
            <div class="tree">
                <h2>Arbre AVL</h2>
                <canvas id="avlCanvas" class="tree-canvas"></canvas>
                <div class="legend">
                    <div class="legend-item">
                        <div class="legend-color avl-color"></div>
                        <span>AVL</span>
                    </div>
                </div>
            </div>
            
            <div class="tree">
                <h2>Arbre Rouge-Noir</h2>
                <canvas id="rbCanvas" class="tree-canvas"></canvas>
                <div class="legend">
                    <div class="legend-item">
                        <div class="legend-color rb-color"></div>
                        <span>Rouge-Noir</span>
                    </div>
                </div>
            </div>
            
            <div class="tree">
                <h2>Arbre B</h2>
                <canvas id="bCanvas" class="tree-canvas"></canvas>
                <div class="legend">
                    <div class="legend-item">
                        <div class="legend-color b-color"></div>
                        <span>B-Arbre</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Configuration
        const CANVAS_WIDTH = 300;
        const CANVAS_HEIGHT = 400;
        const NODE_RADIUS = 15;
        const HORIZONTAL_SPACING = 60;
        const VERTICAL_SPACING = 60;
        const ANIMATION_DURATION = 500;

        // Classes d'arbres
        class AVLNode {
            constructor(value) {
                this.value = value;
                this.left = null;
                this.right = null;
                this.height = 1;
            }
        }

        class AVLTree {
            constructor() {
                this.root = null;
            }

            getHeight(node) {
                return node ? node.height : 0;
            }

            getBalance(node) {
                return node ? this.getHeight(node.left) - this.getHeight(node.right) : 0;
            }

            updateHeight(node) {
                if (node) {
                    node.height = 1 + Math.max(this.getHeight(node.left), this.getHeight(node.right));
                }
            }

            rotateRight(y) {
                const x = y.left;
                const T2 = x.right;

                x.right = y;
                y.left = T2;

                this.updateHeight(y);
                this.updateHeight(x);

                return x;
            }

            rotateLeft(x) {
                const y = x.right;
                const T2 = y.left;

                y.left = x;
                x.right = T2;

                this.updateHeight(x);
                this.updateHeight(y);

                return y;
            }

            insert(node, value) {
                if (!node) return new AVLNode(value);

                if (value < node.value) {
                    node.left = this.insert(node.left, value);
                } else if (value > node.value) {
                    node.right = this.insert(node.right, value);
                } else {
                    return node; // Valeur déjà présente
                }

                this.updateHeight(node);

                const balance = this.getBalance(node);

                // Rotations
                if (balance > 1 && value < node.left.value) {
                    return this.rotateRight(node);
                }
                if (balance < -1 && value > node.right.value) {
                    return this.rotateLeft(node);
                }
                if (balance > 1 && value > node.left.value) {
                    node.left = this.rotateLeft(node.left);
                    return this.rotateRight(node);
                }
                if (balance < -1 && value < node.right.value) {
                    node.right = this.rotateRight(node.right);
                    return this.rotateLeft(node);
                }

                return node;
            }

            insertValue(value) {
                this.root = this.insert(this.root, value);
            }

            getInOrder(node, result = []) {
                if (node) {
                    this.getInOrder(node.left, result);
                    result.push(node.value);
                    this.getInOrder(node.right, result);
                }
                return result;
            }
        }

        class RBNode {
            constructor(value) {
                this.value = value;
                this.left = null;
                this.right = null;
                this.color = 'red';
                this.parent = null;
            }
        }

        class RBTree {
            constructor() {
                this.root = null;
                this.NIL = new RBNode(null);
                this.NIL.color = 'black';
            }

            insert(node, value) {
                // NIL est une sentinelle partagée (objet truthy) : il faut l'arrêter
                // ici comme une feuille, sinon on descend dans NIL puis on le MUTE
                // (node.right = ...) → sentinelle corrompue, partagée par toutes les
                // feuilles → récursion infinie dès la 2e insertion.
                if (!node || node === this.NIL) {
                    const newNode = new RBNode(value);
                    newNode.left = this.NIL;
                    newNode.right = this.NIL;
                    return newNode;
                }

                if (value < node.value) {
                    node.left = this.insert(node.left, value);
                    node.left.parent = node;
                } else if (value > node.value) {
                    node.right = this.insert(node.right, value);
                    node.right.parent = node;
                } else {
                    return node;
                }

                return this.fixInsert(node);
            }

            fixInsert(node) {
                // Simplification : pas de rééquilibrage complet
                return node;
            }

            insertValue(value) {
                this.root = this.insert(this.root, value);
                if (this.root) this.root.color = 'black';
            }

            getInOrder(node, result = []) {
                if (node && node.value !== null) {
                    this.getInOrder(node.left, result);
                    result.push(node.value);
                    this.getInOrder(node.right, result);
                }
                return result;
            }
        }

        class BNode {
            constructor() {
                this.keys = [];
                this.children = [];
                this.leaf = true;
            }
        }

        class BTree {
            constructor(t) {
                this.root = new BNode();
                this.t = t;
            }

            insert(value) {
                const root = this.root;
                if (root.keys.length === (2 * this.t) - 1) {
                    const newRoot = new BNode();
                    newRoot.children.push(root);
                    newRoot.leaf = false;
                    this.splitChild(newRoot, 0);
                    this.insertNonFull(newRoot, value);
                    this.root = newRoot;
                } else {
                    this.insertNonFull(root, value);
                }
            }

            insertNonFull(node, value) {
                let i = node.keys.length - 1;
                if (node.leaf) {
                    node.keys.push(null);
                    while (i >= 0 && node.keys[i] > value) {
                        node.keys[i + 1] = node.keys[i];
                        i--;
                    }
                    node.keys[i + 1] = value;
                } else {
                    while (i >= 0 && node.keys[i] > value) {
                        i--;
                    }
                    i++;
                    if (node.children[i].keys.length === (2 * this.t) - 1) {
                        this.splitChild(node, i);
                        if (value > node.keys[i]) {
                            i++;
                        }
                    }
                    this.insertNonFull(node.children[i], value);
                }
            }

            splitChild(parent, index) {
                const t = this.t;
                const y = parent.children[index];
                const z = new BNode();
                z.leaf = y.leaf;
                z.keys = y.keys.slice(t, 2 * t - 1);
                if (!y.leaf) {
                    z.children = y.children.slice(t, 2 * t);
                }
                // La clé médiane doit être capturée AVANT de tronquer y.keys —
                // sinon y.keys[t-1] est hors borne (undefined) → on promeut null.
                const median = y.keys[t - 1];
                y.keys = y.keys.slice(0, t - 1);
                parent.children.splice(index + 1, 0, z);
                parent.keys.splice(index, 0, median);
            }

            insertValue(value) {
                this.insert(value);
            }

            getInOrder(node, result = []) {
                if (node) {
                    for (let i = 0; i < node.keys.length; i++) {
                        if (!node.leaf) {
                            this.getInOrder(node.children[i], result);
                        }
                        result.push(node.keys[i]);
                    }
                    if (!node.leaf) {
                        this.getInOrder(node.children[node.keys.length], result);
                    }
                }
                return result;
            }
        }

        // Initialisation des arbres
        const avlTree = new AVLTree();
        const rbTree = new RBTree();
        const bTree = new BTree(3);

        // Canvas contextes — on fixe la résolution du bitmap, sinon il vaut 300×150
        // par défaut alors que le code dessine en 300×400 (rendu coupé + étiré).
        function setupCanvas(id) {
            const canvas = document.getElementById(id);
            canvas.width = CANVAS_WIDTH;
            canvas.height = CANVAS_HEIGHT;
            return canvas.getContext('2d');
        }
        const avlCtx = setupCanvas('avlCanvas');
        const rbCtx = setupCanvas('rbCanvas');
        const bCtx = setupCanvas('bCanvas');

        // ----- Helpers de dessin -----
        function strokeLine(ctx, x1, y1, x2, y2) {
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.strokeStyle = '#FFFFFF';
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        function fillCircle(ctx, x, y, r, color) {
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI * 2);
            ctx.fillStyle = color;
            ctx.fill();
            ctx.strokeStyle = '#FFFFFF';
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        function roundRect(ctx, x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.arcTo(x + w, y, x + w, y + h, r);
            ctx.arcTo(x + w, y + h, x, y + h, r);
            ctx.arcTo(x, y + h, x, y, r);
            ctx.arcTo(x, y, x + w, y, r);
            ctx.closePath();
        }

        // Feuille « vide » : null (AVL) ou sentinelle NIL du rouge-noir (value === null).
        // C'est elle qui faisait planter drawNode : NIL est un objet (truthy) → on y
        // descendait → null.toString() levait une TypeError.
        function isNil(node, tree) {
            return !node || node === (tree && tree.NIL) ||
                   node.value === null || node.value === undefined;
        }

        // ----- Aiguillage par type d'arbre -----
        function drawTree(ctx, tree, title) {
            ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);

            // Titre
            ctx.fillStyle = '#FFFFFF';
            ctx.font = 'bold 16px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(title, ctx.canvas.width / 2, 22);

            const root = tree.root;
            if (!root) return;

            // B-arbre : nœuds multi-clés (keys[]/children[]), pas de .value/.left/.right
            // → renderer dédié. Le garde !tree.root ne suffisait pas : la racine d'un
            // B-arbre vide est un BNode (truthy).
            if (Array.isArray(root.keys)) {
                if (root.keys.length === 0) return; // B-arbre vide
                drawBNode(ctx, root, ctx.canvas.width / 2, 55, 0);
                return;
            }

            // Arbres binaires (AVL, rouge-noir) : x par parcours in-ordre (jamais de
            // chevauchement, occupe toute la largeur), y par profondeur.
            drawBinary(ctx, tree);
        }

        // ----- Arbres binaires (AVL, rouge-noir) -----
        function drawBinary(ctx, tree) {
            const W = ctx.canvas.width;
            const nodes = [];
            (function visit(node, depth) {
                if (isNil(node, tree)) return;
                visit(node.left, depth + 1);
                node.__col = nodes.length;
                node.__depth = depth;
                nodes.push(node);
                visit(node.right, depth + 1);
            })(tree.root, 0);
            if (!nodes.length) return;

            const stepX = W / (nodes.length + 1);
            const topY = 55;
            const xOf = n => (n.__col + 1) * stepX;
            const yOf = n => topY + n.__depth * VERTICAL_SPACING;

            for (const n of nodes) {
                if (!isNil(n.left, tree))  strokeLine(ctx, xOf(n), yOf(n), xOf(n.left), yOf(n.left));
                if (!isNil(n.right, tree)) strokeLine(ctx, xOf(n), yOf(n), xOf(n.right), yOf(n.right));
            }
            for (const n of nodes) {
                const color = n.color === 'red' ? '#E74C3C'
                            : n.color === 'black' ? '#2C3E50'
                            : '#FF6B6B';
                fillCircle(ctx, xOf(n), yOf(n), NODE_RADIUS, color);
                ctx.fillStyle = '#FFFFFF';
                ctx.font = 'bold 12px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(String(n.value), xOf(n), yOf(n));
            }
            ctx.textBaseline = 'alphabetic';
        }

        // ----- B-arbre : boîte de clés + récursion sur children[] -----
        function drawBNode(ctx, node, x, y, level) {
            if (!node) return;
            const KW = 24, BH = 28;
            const keys = node.keys;
            const boxW = Math.max(KW, keys.length * KW);

            // Enfants d'abord (les liens partent du bas de la boîte du parent).
            if (!node.leaf && node.children.length) {
                const span = ctx.canvas.width / Math.pow(2, level + 1);
                const n = node.children.length;
                const childY = y + 75;
                for (let i = 0; i < n; i++) {
                    const cx = x + (i - (n - 1) / 2) * span;
                    strokeLine(ctx, x, y + BH / 2, cx, childY - BH / 2);
                    drawBNode(ctx, node.children[i], cx, childY, level + 1);
                }
            }

            // Boîte de clés.
            ctx.lineWidth = 2;
            ctx.strokeStyle = '#FFFFFF';
            ctx.fillStyle = '#FFE66D';
            roundRect(ctx, x - boxW / 2, y - BH / 2, boxW, BH, 5);
            ctx.fill();
            ctx.stroke();

            ctx.fillStyle = '#1a2a6c';
            ctx.font = 'bold 13px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            for (let i = 0; i < keys.length; i++) {
                const kx = x - boxW / 2 + KW * (i + 0.5);
                ctx.fillText(String(keys[i]), kx, y);
                if (i > 0) {
                    const sep = x - boxW / 2 + KW * i;
                    strokeLine(ctx, sep, y - BH / 2, sep, y + BH / 2);
                }
            }
            ctx.textBaseline = 'alphabetic';
        }

        // Mise à jour de l'affichage
        function updateDisplay() {
            drawTree(avlCtx, avlTree, "Arbre AVL");
            drawTree(rbCtx, rbTree, "Arbre Rouge-Noir");
            drawTree(bCtx, bTree, "Arbre B");
        }

        // Insertion de valeur
        function insertValue() {
            const valueInput = document.getElementById('valueInput');
            const value = parseInt(valueInput.value);
            
            if (isNaN(value)) {
                document.getElementById('status').textContent = "Veuillez entrer une valeur valide";
                return;
            }
            
            const treeType = document.getElementById('treeSelect').value;
            
            if (treeType === 'avl') {
                avlTree.insertValue(value);
            } else if (treeType === 'rb') {
                rbTree.insertValue(value);
            } else {
                bTree.insertValue(value);
            }
            
            valueInput.value = '';
            document.getElementById('status').textContent = `Valeur ${value} insérée dans l'arbre ${treeType.toUpperCase()}`;
            updateDisplay();
        }

        // Insertion aléatoire
        function insertRandom() {
            const value = Math.floor(Math.random() * 100) + 1;
            const treeType = document.getElementById('treeSelect').value;
            
            if (treeType === 'avl') {
                avlTree.insertValue(value);
            } else if (treeType === 'rb') {
                rbTree.insertValue(value);
            } else {
                bTree.insertValue(value);
            }
            
            document.getElementById('status').textContent = `Valeur ${value} insérée aléatoirement dans l'arbre ${treeType.toUpperCase()}`;
            updateDisplay();
        }

        // Effacer tous les arbres
        function clearAll() {
            avlTree.root = null;
            rbTree.root = null;
            bTree.root = new BNode();
            document.getElementById('status').textContent = "Tous les arbres ont été effacés";
            updateDisplay();
        }

        // Initialisation
        updateDisplay();
    </script>
</body>
</html>
