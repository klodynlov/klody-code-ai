version: 2
updates:
  # Dépendances Python (lockfile pip-tools)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 5
    labels:
      - "deps"
      - "python"
    groups:
      runtime:
        applies-to: "version-updates"
        patterns:
          - "fastapi"
          - "uvicorn"
          - "openai"
          - "httpx"
          - "fastmcp"
          - "tree-sitter*"
      dev:
        applies-to: "version-updates"
        patterns:
          - "pytest*"
          - "bandit"
          - "pip-audit"

  # Actions GitHub
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 3
    labels:
      - "deps"
      - "github-actions"
