name: Regen lockfile (temp)
on:
  push:
    branches: [fix/lockfile-st]
permissions:
  contents: write
jobs:
  regen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install "pip-tools>=7.4.1"
      - name: Recompile lock and push if stale
        run: |
          pip-compile requirements.txt --output-file requirements.lock --strip-extras --quiet
          if git diff --quiet requirements.lock; then
            echo "lock déjà frais, rien à committer"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add requirements.lock
          git commit -m "fix(deps): régénère requirements.lock (sentence-transformers) [skip ci]"
          git push
