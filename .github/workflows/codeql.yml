name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Lundi 02:00 UTC (refresh hebdomadaire des règles de détection)
    - cron: "0 2 * * 1"

# GITHUB_TOKEN au strict minimum pour ce workflow
permissions:
  contents: read
  security-events: write  # nécessaire pour uploader les résultats CodeQL
  actions: read
  packages: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        language: ["python"]

    steps:
      - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          category: "/language:${{ matrix.language }}"
