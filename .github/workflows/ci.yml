name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# GITHUB_TOKEN au strict minimum (principe du moindre privilège).
# Les jobs qui ont besoin de plus de droits les déclarent explicitement.
permissions:
  contents: read

# Annule les runs précédents sur la même branche (économise des minutes Actions)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Tests unitaires + coverage gate (matrice Python 3.11 / 3.12)
  # ─────────────────────────────────────────────────────────────────
  tests:
    name: Tests + coverage (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v7
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.lock

      - name: Install pinned dependencies (lockfile)
        run: pip install -r requirements.lock

      - name: Create .env for tests
        run: |
          cat > .env << 'EOF'
          OLLAMA_BASE_URL=http://localhost:11434/v1
          OLLAMA_API_KEY=ollama
          BACKEND=ollama
          MODEL_NAME=qwen3.5:9b
          MODEL_FALLBACK=qwen3.5:9b
          MLX_MODEL=mlx-community/Qwen3-Coder-30B-A3B-Instruct-4bit-dwq-v2
          PROJECT_ROOT=/tmp/klody-test
          MAX_FILE_SIZE=1048576
          MAX_ITERATIONS=10
          MAX_MESSAGES=50
          SUBPROCESS_TIMEOUT=30
          LIBRARYBRAIN_DIR=
          LIBRARYBRAIN_URL=http://127.0.0.1:8765/api/ask
          MCP_SERVER_URL=http://127.0.0.1:8082/mcp
          EOF
          mkdir -p /tmp/klody-test

      - name: Run tests with coverage (gate ≥ 70% via .coveragerc)
        run: pytest tests/ -v --cov --cov-report=term --cov-report=xml

      - name: Upload coverage artefact
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v7
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 14

      - name: Syntax smoke (entrypoints)
        run: |
          python -m py_compile api/server.py
          python -m py_compile agent/memory.py
          python -m py_compile agent/llm.py
          python -m py_compile agent/orchestrator.py
          python -m py_compile services.py
          python -m py_compile tools/skills.py

  # ─────────────────────────────────────────────────────────────────
  # Qualité — lint (ruff) + typage du cœur (mypy). Config : pyproject.toml
  # ─────────────────────────────────────────────────────────────────
  quality:
    name: Lint & types (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      - uses: actions/setup-python@v7
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          python-version: "3.11"
          cache: pip
      # Outils épinglés aux versions exactes du .venv local — seul un bump
      # délibéré change le comportement du lint (vécu 2026-07-03 : mypy 2.1.0
      # non épinglé a cassé la CI de la PR #94 sur une erreur préexistante
      # de main, fix 1dbcbb9).
      # Procédure de bump :
      #   1. pip install -U ruff mypy dans .venv local
      #   2. ruff check + mypy verts en local (corriger le code si besoin)
      #   3. reporter les versions exactes ici, dans le même commit que les fixes
      - run: pip install "ruff==0.15.15" "mypy==2.1.0"
      - name: Ruff (lint)
        run: ruff check agent/ tools/ api/ klody_mcp/ config.py main.py services.py bench/ scripts/
      - name: Mypy (cœur typé — voir [tool.mypy].files dans pyproject.toml)
        run: mypy

  # ─────────────────────────────────────────────────────────────────
  # SAST Python — block sur HIGH severity
  # ─────────────────────────────────────────────────────────────────
  bandit:
    name: Security (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      - uses: actions/setup-python@v7
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          python-version: "3.11"
          cache: pip
      # Épinglé (version du .venv local) — bump délibéré only, cf. procédure job quality
      - run: pip install "bandit==1.9.4"
      - name: Bandit scan (fail on HIGH)
        run: bandit -r agent/ tools/ api/ --severity-level high

  # ─────────────────────────────────────────────────────────────────
  # Vulnérabilités des dépendances Python
  # ─────────────────────────────────────────────────────────────────
  pip-audit:
    name: Deps audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      - uses: actions/setup-python@v7
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          python-version: "3.11"
          cache: pip
      # Épinglé (version du .venv local) — bump délibéré only, cf. procédure job quality
      - run: pip install "pip-audit==2.10.0"
      - name: Audit lockfile
        # CVE-2025-3000 (torch.jit.script, corruption mémoire) : aucune release corrigée
        # au 2026-06-12 ; vecteur local-only (AV:L/PR:L, impacts L), jit.script sur entrée
        # non fiable hors threat model PyTorch. Usage repo : embeddings in-process
        # sentence-transformers, pas de jit.script sur entrée externe.
        # Retirer l'ignore dès qu'une release torch corrige (vérifier OSV/PYSEC-2025-194).
        run: pip-audit -r requirements.lock --strict --progress-spinner=off --ignore-vuln CVE-2025-3000

  # ─────────────────────────────────────────────────────────────────
  # Scan secrets — empêche commit de tokens / clés
  # ─────────────────────────────────────────────────────────────────
  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          # fetch-depth: 0 nécessaire pour scanner l'historique sur PR
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  # ─────────────────────────────────────────────────────────────────
  # Lockfile drift — vérifie que requirements.lock reflète requirements.txt
  # ─────────────────────────────────────────────────────────────────
  lockfile:
    name: Lockfile freshness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      - uses: actions/setup-python@v7
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          python-version: "3.11"
          cache: pip
      # Épinglé (version du .venv local) — bump délibéré only, cf. procédure job quality
      - run: pip install "pip-tools==7.5.3"
      - name: Re-compile lockfile and diff
        run: |
          cp requirements.lock requirements.lock.bak
          # --allow-unsafe : émet pip/setuptools dans le lock (plancher sécurité
          # setuptools>=83.0.0, PYSEC-2026-3447 — cf. requirements.txt)
          pip-compile requirements.txt --output-file requirements.lock --strip-extras --allow-unsafe --quiet
          if ! diff -q requirements.lock.bak requirements.lock > /dev/null; then
            echo "::error::requirements.lock est obsolète. Lance: pip-compile requirements.txt --output-file requirements.lock --strip-extras --allow-unsafe"
            diff requirements.lock.bak requirements.lock | head -50
            exit 1
          fi
          echo "Lockfile à jour ✅"
